services:
  - type: web
    name: freelancehub
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        # This will be replaced by your Render app URL
        value: https://freelancehub.onrender.com
      - key: CLIENT_URL
        value: https://freelancehub.onrender.com
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PLATFORM_FEE_PERCENT
        value: 12
      # The following values must be set in the Render Dashboard
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
